<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MNP 3プラン比較 (端末代込)</title>
<style>
  :root {
    --bg-color: #121212;
    --card-bg-color: #1e1e1e;
    --text-color: #e0e0e0;
    --primary-color: #bb86fc;
    --border-color: #333;
    --accent-color: #03dac6;
    --warn-color: #ff6b6b;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background-color: var(--bg-color);
    color: var(--text-color);
    margin: 0;
    padding: 15px;
    display: flex;
    justify-content: center;
  }

  .container { width: 100%; max-width: 800px; }
  h1 { text-align: center; color: var(--primary-color); font-size: 1.3rem; }

  .settings-card {
    background-color: var(--card-bg-color);
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 20px;
    border: 1px solid var(--border-color);
  }

  .plan-card {
    background-color: var(--card-bg-color);
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 15px;
    border: 1px solid var(--border-color);
  }

  .plan-header {
    border-bottom: 2px solid var(--border-color);
    margin-bottom: 15px;
    padding-bottom: 5px;
    font-weight: bold;
    color: var(--primary-color);
  }

  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  .input-group { flex: 1; }

  label { display: block; margin-bottom: 4px; font-size: 0.8rem; color: #aaa; }

  input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid var(--border-color);
    background-color: #2a2a2a;
    color: var(--text-color);
    font-size: 1rem;
    box-sizing: border-box;
  }

  .result-group {
    background-color: #2a2a2a;
    padding: 12px;
    border-radius: 8px;
    margin-top: 10px;
  }

  .result-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9rem; }
  .total-row {
    border-top: 1px solid var(--border-color);
    padding-top: 8px;
    margin-top: 5px;
    font-size: 1.1rem;
    font-weight: bold;
  }
  .total-value { color: var(--accent-color); }
</style>
</head>
<body>

<div class="container">
  <h1>MNP 比較 (端末代込)</h1>

  <div class="settings-card">
    <label>短期解約の基準日数 (例: 180, 211)</label>
    <input type="number" id="ruleDays" value="180" oninput="calculate()">
  </div>

  <div id="plans">
    <div class="plan-card">
      <div class="plan-header">プラン A</div>
      <div class="input-row">
        <div class="input-group">
          <label>端末代金 (円)</label>
          <input type="number" class="device-cost" value="1" oninput="calculate()">
        </div>
        <div class="input-group">
          <label>事務手数料 (円)</label>
          <input type="number" class="admin-cost" value="3850" oninput="calculate()">
        </div>
      </div>
      <div class="input-row">
        <div class="input-group">
          <label>月額 (円)</label>
          <input type="number" class="monthly-cost" value="990" oninput="calculate()">
        </div>
        <div class="input-group">
          <label>維持月数</label>
          <input type="number" class="months" value="7" oninput="calculate()">
        </div>
      </div>
      <div class="result-group">
        <div class="result-row">
          <span>維持日数 (目安)</span>
          <span class="days-display">210 日</span>
        </div>
        <div class="result-row total-row">
          <span>総合計 (税込)</span>
          <span class="total-value"><span class="total-display">0</span> 円</span>
        </div>
      </div>
    </div>

    <div class="plan-card">
      <div class="plan-header">プラン B</div>
      <div class="input-row">
        <div class="input-group">
          <label>端末代金 (円)</label>
          <input type="number" class="device-cost" value="22000" oninput="calculate()">
        </div>
        <div class="input-group">
          <label>事務手数料 (円)</label>
          <input type="number" class="admin-cost" value="0" oninput="calculate()">
        </div>
      </div>
      <div class="input-row">
        <div class="input-group">
          <label>月額 (円)</label>
          <input type="number" class="monthly-cost" value="2178" oninput="calculate()">
        </div>
        <div class="input-group">
          <label>維持月数</label>
          <input type="number" class="months" value="6" oninput="calculate()">
        </div>
      </div>
      <div class="result-group">
        <div class="result-row">
          <span>維持日数 (目安)</span>
          <span class="days-display">180 日</span>
        </div>
        <div class="result-row total-row">
          <span>総合計 (税込)</span>
          <span class="total-value"><span class="total-display">0</span> 円</span>
        </div>
      </div>
    </div>

    <div class="plan-card">
      <div class="plan-header">プラン C</div>
      <div class="input-row">
        <div class="input-group">
          <label>端末代金 (円)</label>
          <input type="number" class="device-cost" value="0" oninput="calculate()">
        </div>
        <div class="input-group">
          <label>事務手数料 (円)</label>
          <input type="number" class="admin-cost" value="3300" oninput="calculate()">
        </div>
      </div>
      <div class="input-row">
        <div class="input-group">
          <label>月額 (円)</label>
          <input type="number" class="monthly-cost" value="550" oninput="calculate()">
        </div>
        <div class="input-group">
          <label>維持月数</label>
          <input type="number" class="months" value="12" oninput="calculate()">
        </div>
      </div>
      <div class="result-group">
        <div class="result-row">
          <span>維持日数 (目安)</span>
          <span class="days-display">360 日</span>
        </div>
        <div class="result-row total-row">
          <span>総合計 (税込)</span>
          <span class="total-value"><span class="total-display">0</span> 円</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function calculate() {
  const ruleDays = parseInt(document.getElementById('ruleDays').value) || 0;
  const cards = document.querySelectorAll('.plan-card');

  cards.forEach(card => {
    const device = parseInt(card.querySelector('.device-cost').value) || 0;
    const admin = parseInt(card.querySelector('.admin-cost').value) || 0;
    const monthly = parseInt(card.querySelector('.monthly-cost').value) || 0;
    const months = parseInt(card.querySelector('.months').value) || 0;

    const total = device + admin + (monthly * months);
    const days = months * 30;

    const daysDisp = card.querySelector('.days-display');
    daysDisp.innerText = days + " 日";
    daysDisp.style.color = days < ruleDays ? "var(--warn-color)" : "var(--text-color)";
    
    card.querySelector('.total-display').innerText = total.toLocaleString();
  });
}
window.onload = calculate;
</script>
</body>
</html>
